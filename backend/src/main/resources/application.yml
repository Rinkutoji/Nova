spring:
  datasource:
    url: jdbc:mysql://mysql:3306/nova_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

nova:
  jwt:
    secret: ${JWT_SECRET:nova-super-secret-key-change-this-in-production-min-256-bits}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000

logging:
  level:
    "[com.nova]": DEBUG
    "[org.springframework.security]": INFO